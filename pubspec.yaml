name: slovofon
description: A cross-platform audiobook app for Android, Android TV, and Windows.
publish_to: "none"
repository: https://github.com/Dushnyj/Slovofon
issue_tracker: https://github.com/Dushnyj/Slovofon/issues
version: 0.0.1+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  drift: 2.31.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.3.0
  go_router: ^17.2.3
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3_flutter_libs: 0.5.40

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: 2.31.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/app/
    - assets/icons/
    - assets/icons/book/
    - assets/icons/downloads/
    - assets/icons/nav/
    - assets/icons/player/
    - assets/icons/source/
    - assets/icons/system/
    - assets/l10n/
