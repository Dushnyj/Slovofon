name: slovofon
description: A cross-platform audiobook app for Android, Android TV, and Windows.
publish_to: "none"
repository: https://github.com/Dushnyj/Slovofon
issue_tracker: https://github.com/Dushnyj/Slovofon/issues
version: 0.0.1+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.3.0
  go_router: ^17.2.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/app/
    - assets/icons/
    - assets/l10n/
